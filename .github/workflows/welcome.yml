name: Welcome New Contributors

on:
  issues:
    types: [opened]
  discussion:
    types: [created]

permissions:
  issues: write
  discussions: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Welcome to Fable Frog's feedback tracker! Thanks for opening your first issue.

            Here's how things work here:

            - **Community voting**: Others can add a 👍 reaction to your issue to signal interest. Issues with more reactions get prioritized.
            - **Triage**: A maintainer will review your issue and apply labels. Watch for emoji reactions on the issue itself (👀 = reviewing, ✅ = confirmed, 🚀 = planned).
            - **Stay responsive**: If we add the `needs-info` label, please reply within 14 days or the issue will be auto-closed (you can always reopen it).

            For questions and general discussion, check out our [Discussions](https://github.com/Fable-Frog/fablefrog-feedback/discussions) tab.

            See [CONTRIBUTING.md](https://github.com/Fable-Frog/fablefrog-feedback/blob/main/.github/CONTRIBUTING.md) for more details.
          pr-message: ""
