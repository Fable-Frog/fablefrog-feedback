name: Bug Report
description: Report a bug or unexpected behavior in Fable Frog
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: "Found in Settings → About (e.g., 1.0.0 build 42)"
      placeholder: "1.0.0 (42)"
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS Version
      description: "Found in Settings → General → About"
      placeholder: "17.4"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - iPhone 16 Pro Max
        - iPhone 16 Pro
        - iPhone 16 Plus
        - iPhone 16
        - iPhone 15 Pro Max
        - iPhone 15 Pro
        - iPhone 15 Plus
        - iPhone 15
        - iPhone SE (3rd gen)
        - iPad Pro
        - iPad Air
        - iPad mini
        - iPad
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Audiobookshelf Server Version
      description: "Found in your Audiobookshelf server settings"
      placeholder: "2.8.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what happened.
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: "If applicable, add screenshots or screen recordings. Drag and drop images here."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (e.g., does it happen on Wi-Fi only, only with certain books, etc.)
    validations:
      required: false
